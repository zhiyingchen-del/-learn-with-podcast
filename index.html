const CORS_PROXY = "/api/proxy?url=";

async function parseRSS(url) {
  const res = await fetch("/api/proxy?url=" + encodeURIComponent(url));
  if (!res.ok) throw new Error("無法取得 RSS Feed，請確認網址是否正確（" + res.status + "）");
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, "text/xml");
  const channelTitle = xml.querySelector("channel > title")?.textContent || "未知 Podcast";
  const items = Array.from(xml.querySelectorAll("item"));
  return {
    podcastName: channelTitle,
    episodes: items.map((item, i) => {
      const enclosure = item.querySelector("enclosure");
      const duration = item.querySelector("duration")?.textContent || "";
      const pubDate = item.querySelector("pubDate")?.textContent || "";
      return {
        id: `rss-${i}-${Date.now()}`,
        title: item.querySelector("title")?.textContent || `Episode ${i + 1}`,
        podcast: channelTitle,
        date: pubDate ? new Date(pubDate).toLocaleDateString("zh-TW") : "",
        duration: duration,
        audioUrl: enclosure?.getAttribute("url") || "",
        language: "en",
        hasTranscript: false,
        transcript: [],
      };
    }).filter(ep => ep.audioUrl),
  };
}

async function transcribeAudio(audioUrl, openaiKey, language, onProgress) {
  // Download audio in chunks via proxy, then send each chunk to Whisper from browser
  // This avoids Vercel timeout — each chunk is processed independently
  const CHUNK_SIZE = 18 * 1024 * 1024; // 18MB per chunk (~18 mins of audio)
  const langCode = language === "fr" ? "fr" : "en";

  async function sendChunkToWhisper(blob, timeOffset) {
    const formData = new FormData();
    formData.append("file", blob, "audio.mp3");
    formData.append("model", "whisper-1");
    formData.append("language", langCode);
    formData.append("response_format", "verbose_json");
    formData.append("timestamp_granularities[]", "segment");
    const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
      method: "POST",
      headers: { Authorization: "Bearer " + openaiKey },
      body: formData,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || "Whisper API 錯誤：" + res.status);
    }
    const data = await res.json();
    return (data.segments || []).map(seg => ({
      start: seg.start + timeOffset,
      end: seg.end + timeOffset,
      text: seg.text.trim(),
    }));
  }

  // Step 1: Get file size via proxy HEAD request
  const headRes = await fetch("/api/proxy?url=" + encodeURIComponent(audioUrl), { method: "GET", headers: { Range: "bytes=0-0" } });
  let totalSize = 0;
  const contentRange = headRes.headers.get("content-range");
  const contentLength = headRes.headers.get("content-length");
  if (contentRange) {
    const match = contentRange.match(/\/(\d+)$/);
    if (match) totalSize = parseInt(match[1]);
  }
  if (!totalSize && contentLength) totalSize = parseInt(contentLength);

  let allSegments = [];

  if (!totalSize || totalSize <= CHUNK_SIZE) {
    // Small file: download all at once
    if (onProgress) onProgress("下載音訊中...", 10);
    const audioRes = await fetch("/api/proxy?type=audio&url=" + encodeURIComponent(audioUrl));
    if (!audioRes.ok) throw new Error("無法下載音訊（" + audioRes.status + "）");
    const blob = await audioRes.blob();
    if (onProgress) onProgress("送出 Whisper 辨識中...", 40);
    allSegments = await sendChunkToWhisper(blob, 0);
  } else {
    // Large file: chunk it
    const numChunks = Math.ceil(totalSize / CHUNK_SIZE);
    const secsPerByte = (2 * 3600) / totalSize; // rough estimate: 2hr per totalSize bytes

    for (let i = 0; i < numChunks; i++) {
      const start = i * CHUNK_SIZE;
      const end = Math.min((i + 1) * CHUNK_SIZE - 1, totalSize - 1);
      const timeOffset = Math.round(start * secsPerByte);
      const pct = Math.round(((i) / numChunks) * 90);
      if (onProgress) onProgress(`下載第 ${i+1}/${numChunks} 段並辨識中...`, pct);

      const chunkRes = await fetch("/api/proxy?url=" + encodeURIComponent(audioUrl), {
        headers: { Range: "bytes=" + start + "-" + end }
      });
      if (!chunkRes.ok) throw new Error("分段下載失敗（第 " + (i+1) + " 段）");
      const blob = await chunkRes.blob();
      const segments = await sendChunkToWhisper(blob, timeOffset);
      allSegments.push(...segments);
    }
  }

  if (onProgress) onProgress("完成！", 100);
  return allSegments.map((s, i) => ({ id: i, start: s.start, end: s.end, text: s.text }));
}

async function claudeCall(prompt, claudeKey, maxTokens = 1000) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": claudeKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Claude API 錯誤：${res.status}`);
  }
  const data = await res.json();
  return data.content.map(b => b.text || "").join("").replace(/```json|```/g, "").trim();
}

async function lookupWord(word, sentence, language, claudeKey) {
  const langName = language === "fr" ? "法文" : "英文";
  const frExtra = language === "fr" ? `,
  "gender": "陽性(m.) 或 陰性(f.) 或 兩者皆可(m./f.)，若不適用填null",
  "conjugation": "若為動詞列出現在式：je/tu/il/nous/vous/ils，否則填null"` : "";
  const prompt = `你是${langName}語言學習助手，幫助中文母語者。請分析以下單字並以JSON回應（只回傳JSON不要其他文字）：
單字：${word}
所在句子：${sentence}
語言：${langName}
格式：{"word":"${word}","partOfSpeech":"詞性","pronunciation":"IPA音標","translation":"中文翻譯","examples":[{"original":"例句1","translation":"中文1"},{"original":"例句2（生活化）","translation":"中文2"}]${frExtra}}`;
  const text = await claudeCall(prompt, claudeKey, 1000);
  return JSON.parse(text);
}

async function generateMoreExamples(word, translation, language, claudeKey) {
  const langName = language === "fr" ? "法文" : "英文";
  const prompt = `為「${word}」（中文：${translation}）生成3個生活化${langName}例句，場景多元。只回傳JSON陣列：[{"original":"例句","translation":"中文翻譯"},...]`;
  const text = await claudeCall(prompt, claudeKey, 600);
  return JSON.parse(text);
}

async function getSynonyms(word, claudeKey) {
  const prompt = `為「${word}」列出近義詞和反義詞。只回傳JSON：{"synonyms":["詞1","詞2","詞3"],"antonyms":["詞1","詞2"]}`;
  const text = await claudeCall(prompt, claudeKey, 300);
  return JSON.parse(text);
}

async function getFrConjugation(word, claudeKey) {
  const prompt = `請列出法文動詞「${word}」的完整變化表（現在式、過去式、未來式）。只回傳JSON：{"present":{"je":"","tu":"","il":"","nous":"","vous":"","ils":""},"passe":{"je":"","tu":"","il":"","nous":"","vous":"","ils":""},"futur":{"je":"","tu":"","il":"","nous":"","vous":"","ils":""}}`;
  const text = await claudeCall(prompt, claudeKey, 500);
  return JSON.parse(text);
}

async function generateQuiz(flashcards, transcript, claudeKey) {
  const cards = flashcards.slice(0, 12).map(c =>
    `${c.word}(${c.partOfSpeech})=${c.translation}｜例：${c.exampleOriginal.slice(0, 80)}`
  ).join("\n");
  const transcriptText = transcript.map(s => s.text).join(" ").slice(0, 600);
  const prompt = `你是語言測驗出題老師，根據以下單字和文本生成6道測驗題，涵蓋5種題型（en_to_zh/zh_to_en/cloze/pick_sentence/fill各至少一題）。只回傳JSON陣列。

單字：
${cards}

文本：${transcriptText}

JSON格式（嚴格遵守）：
[
  {"type":"en_to_zh","word":"單字","partOfSpeech":"n.","options":["正確中文","錯誤1","錯誤2","錯誤3"],"answer":0},
  {"type":"zh_to_en","chineseWord":"中文意思","partOfSpeech":"adj.","options":["正確英文","錯誤1","錯誤2","錯誤3"],"answer":0},
  {"type":"cloze","word":"單字","sentenceBefore":"句子前半","sentenceAfter":"句子後半","sentenceTranslation":"中文翻譯含___","options":["正確","錯誤1","錯誤2","錯誤3"],"answer":0},
  {"type":"pick_sentence","word":"單字","translation":"中文","options":["正確例句","錯誤句1","錯誤句2","錯誤句3"],"correctIdx":0,"note":"解析說明"},
  {"type":"fill","chineseHint":"中文意思","partOfSpeech":"n.","sentence":"含_____的句子","sentenceTranslation":"中文版含___","answer":"正確單字"},
  {"type":"en_to_zh","word":"另一單字","partOfSpeech":"v.","options":["正確中文","錯誤1","錯誤2","錯誤3"],"answer":0}
]`;
  const text = await claudeCall(prompt, claudeKey, 2000);
  return JSON.parse(text);
}

// ============================================================
// HELPERS
// ============================================================
const fmtTime = (s) => { const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,"0")}`; };
const genId = () => `${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
const QUIZ_TYPE_LABEL = { en_to_zh:"選擇題・英文選中文", zh_to_en:"選擇題・中文選英文", cloze:"克漏字・選出正確單字", pick_sentence:"選擇題・選出正確例句", fill:"填空題" };

// ============================================================
// WORD PANEL
// ============================================================
const WordPanel = ({ word, sentence, language, claudeKey, onClose, onAddToLibrary, episode }) => {
  const [info, setInfo] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [added, setAdded] = useState(false);
  const [moreExamples, setMoreExamples] = useState(null);
  const [loadingMore, setLoadingMore] = useState(false);
  const [synonyms, setSynonyms] = useState(null);
  const [loadingSyn, setLoadingSyn] = useState(false);
  const [conjugation, setConjugation] = useState(null);
  const [loadingConj, setLoadingConj] = useState(false);

  useEffect(() => {
    if (!word) return;
    setInfo(null); setError(""); setAdded(false); setMoreExamples(null); setSynonyms(null); setConjugation(null);
    if (!claudeKey) { setError("請先在設定頁面輸入 Claude API Key"); return; }
    setLoading(true);
    lookupWord(word, sentence, language, claudeKey)
      .then(setInfo).catch(e => setError(e.message)).finally(() => setLoading(false));
  }, [word]);

  const handleAdd = () => {
    if (!info) return;
    onAddToLibrary({
      id: genId(), word: info.word, partOfSpeech: info.partOfSpeech, translation: info.translation,
      pronunciation: info.pronunciation,
      exampleOriginal: info.examples[0]?.original || sentence,
      exampleTranslation: info.examples[0]?.translation || "",
      language, tags: [], gender: info.gender || null,
      source: { podcast: episode?.podcast || "", episode: episode?.title || "", time: fmtTime(0) },
      proficiency: "unknown", occurrences: 1, pinned: false,
      occurrenceRecords: [{ source: episode?.title || "", sentence, time: fmtTime(0) }],
    });
    setAdded(true);
  };

  const handleMoreExamples = async () => {
    if (!info || !claudeKey) return;
    setLoadingMore(true);
    try { setMoreExamples(await generateMoreExamples(info.word, info.translation, language, claudeKey)); }
    catch (e) { setError(e.message); } finally { setLoadingMore(false); }
  };

  const handleSynonyms = async () => {
    if (!info || !claudeKey) return;
    setLoadingSyn(true);
    try { setSynonyms(await getSynonyms(info.word, claudeKey)); }
    catch (e) { setError(e.message); } finally { setLoadingSyn(false); }
  };

  const handleConjugation = async () => {
    if (!info || !claudeKey) return;
    setLoadingConj(true);
    try { setConjugation(await getFrConjugation(info.word, claudeKey)); }
    catch (e) { setError(e.message); } finally { setLoadingConj(false); }
  };

  return (
    <div className={`word-panel ${word ? "open" : ""}`}>
      <div className="word-panel-header">
        <div>
          {loading ? <div style={{color:"var(--text2)",fontSize:14}}>查詢中…</div> :
           info ? <>
            <div className="word-main">{info.word}</div>
            {info.pronunciation && <div className="word-pron">{info.pronunciation}</div>}
            <div className="word-pos">{info.partOfSpeech}</div>
            {info.gender && <span style={{fontSize:12,color:"var(--gold)",marginLeft:6}}>{info.gender}</span>}
          </> : <div style={{fontSize:18,fontWeight:700}}>{word}</div>}
        </div>
        <button className="btn btn-ghost btn-icon" onClick={onClose}><Icon name="x" size={16}/></button>
      </div>
      <div className="word-panel-body">
        {error && <div className="error-box"><Icon name="alertCircle" size={15}/>{error}</div>}
        {info && <>
          <div>
            <div className="section-label">中文翻譯</div>
            <div className="word-translation">{info.translation}</div>
          </div>
          <div>
            <div className="section-label">例句</div>
            {info.examples.map((ex,i) => (
              <div key={i} className="example-card">
                <div className="example-original">
                  {ex.original.split(/\b/).map((w,j) =>
                    w.toLowerCase() === info.word.toLowerCase()
                      ? <span key={j} style={{color:"var(--accent2)",fontWeight:600}}>{w}</span>
                      : <span key={j}>{w}</span>
                  )}
                </div>

const PlayerPage = ({ episode, onUpdateEpisode, onAddCard, flashcards, claudeKey, openaiKey }) => {
  const audioRef = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration] = useState(0);
  const [speed, setSpeed] = useState(1);
  const [currentSentence, setCurrentSentence] = useState(0);
  const [selectedWord, setSelectedWord] = useState(null);
  const [selectedSentence, setSelectedSentence] = useState("");
  const [transcribing, setTranscribing] = useState(false);
  const [transError, setTransError] = useState("");
  const [transMsg, setTransMsg] = useState("");
  const transcriptRef = useRef(null);
  const speeds = [0.75, 1, 1.25, 1.5];
  const ep = episode || { title:"尚未選擇集數", podcast:"", audioUrl:"", language:"en", hasTranscript:false, transcript:[] };

  useEffect(() => {
    if (!audioRef.current) return;
    const a = audioRef.current;
    const onTime = () => {
      setCurrentTime(a.currentTime);
      if (ep.transcript?.length) {
        const idx = ep.transcript.findIndex((s,i) => {
          const next = ep.transcript[i+1];
          return a.currentTime >= s.start && (!next || a.currentTime < next.start);
        });
        if (idx !== -1) setCurrentSentence(idx);
      }
    };
    const onDur = () => setDuration(a.duration || 0);
    const onEnd = () => setPlaying(false);
    a.addEventListener("timeupdate", onTime);
    a.addEventListener("loadedmetadata", onDur);
    a.addEventListener("ended", onEnd);
    return () => { a.removeEventListener("timeupdate",onTime); a.removeEventListener("loadedmetadata",onDur); a.removeEventListener("ended",onEnd); };
  }, [ep.audioUrl, ep.transcript]);

  // Auto-scroll active sentence
  useEffect(() => {
    if (transcriptRef.current) {
      const active = transcriptRef.current.querySelector(".transcript-sentence.active");
      if (active) active.scrollIntoView({ behavior:"smooth", block:"nearest" });
    }
  }, [currentSentence]);

  const togglePlay = () => {
    if (!audioRef.current) return;
    if (playing) audioRef.current.pause(); else audioRef.current.play();
    setPlaying(!playing);
  };
  const seek = (e) => {
    if (!audioRef.current || !duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    const t = ((e.clientX-r.left)/r.width)*duration;
    audioRef.current.currentTime = t; setCurrentTime(t);
  };
  const skip = (s) => { if (audioRef.current) audioRef.current.currentTime = Math.max(0,audioRef.current.currentTime+s); };
  const nextSpeed = () => { const i=speeds.indexOf(speed); const ns=speeds[(i+1)%speeds.length]; setSpeed(ns); if(audioRef.current) audioRef.current.playbackRate=ns; };
  const jumpTo = (s) => { if (audioRef.current) { audioRef.current.currentTime=s.start; if(!playing){audioRef.current.play();setPlaying(true);} } };
  const handleWordClick = (word, sentence) => { const clean=word.replace(/[^a-zA-ZÀ-ÿ''\-]/g,""); if(clean.length>2){setSelectedWord(clean);setSelectedSentence(sentence);} };

  const handleTranscribe = async () => {
    if (!openaiKey) { setTransError("請先在設定頁面輸入 OpenAI API Key"); return; }
    if (!ep.audioUrl) { setTransError("此集數沒有音訊連結"); return; }
    setTranscribing(true); setTransError("");
    try {
      const segs = await transcribeAudio(ep.audioUrl, openaiKey, ep.language, (msg, pct) => {
        setTransMsg(msg + " (" + pct + "%)");
      });
      onUpdateEpisode({ ...ep, hasTranscript:true, transcript:segs });
    } catch(e) { setTransError(e.message); } finally { setTranscribing(false); }
  };

  const handleAddCard = (info) => onAddCard(info, ep);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="topbar">
        <h2 style={{fontSize:14,fontWeight:600}}>{ep.title}</h2>
        {ep.audioUrl && <span className={`badge badge-${ep.language}`}>{ep.language==="en"?"EN":"FR"}</span>}
      </div>
      {ep.audioUrl && <audio ref={audioRef} src={"/api/proxy?type=audio&url=" + encodeURIComponent(ep.audioUrl)} preload="metadata"/>}
      <div style={{flex:1,overflowY:"auto",padding:24}} ref={transcriptRef}>
        {!ep.audioUrl ? (
          <div className="empty-state"><Icon name="play" size={40}/><h3>請先選擇集數</h3><p>到「Podcast 集數」頁面選擇要播放的集數</p></div>
        ) : !ep.hasTranscript ? (
          <div className="empty-state">
            <div style={{fontSize:48,marginBottom:8}}>🎤</div>
            <h3>尚無逐字稿</h3>
            <p>使用 OpenAI Whisper 自動生成，支援英文與法文辨識</p>
            {transError && <div className="error-box" style={{textAlign:"left"}}><Icon name="alertCircle" size={15}/>{transError}</div>}
            <button className="btn btn-primary" onClick={handleTranscribe} disabled={transcribing}>
              {transcribing ? <><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}><Icon name="loader" size={14}/></span>{transMsg || "準備中..."}</> : "生成逐字稿"}
            </button>
            {transcribing && <div className="processing-bar" style={{width:280}}><div className="processing-fill"/></div>}
          </div>
        ) : (
          <div>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>點擊單字查詢 · 點擊句子跳轉播放</div>
            {ep.transcript.map((s,i) => (
              <div key={s.id} className={`transcript-sentence ${currentSentence===i?"active":""}`} onClick={()=>jumpTo(s)}>
                <div className="transcript-time">{fmtTime(s.start)}</div>
                <div>{s.text.split(/(\s+)/).map((token,j) => token.trim()
                  ? <span key={j} className="word-clickable" onClick={e=>{e.stopPropagation();handleWordClick(token,s.text);}}>{token}</span>
                  : <span key={j}>{token}</span>
                )}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {ep.audioUrl && (
        <div className="player">
          <div className="player-top">
            <div style={{width:44,height:44,borderRadius:10,background:"linear-gradient(135deg,var(--accent),#4a3fa0)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
              {ep.language==="fr"?"🇫🇷":"🎙️"}
            </div>
            <div className="player-info">
              <div className="player-title">{ep.title}</div>
              <div className="player-sub">{ep.podcast}</div>
            </div>
            <div className="player-controls">
              <button className="ctrl-btn" onClick={nextSpeed}><span className="speed-btn">{speed}x</span></button>
              <button className="ctrl-btn" onClick={()=>skip(-15)}><Icon name="rewind" size={18}/></button>
              <button className="play-btn" onClick={togglePlay}><Icon name={playing?"pause":"play"} size={18}/></button>
              <button className="ctrl-btn" onClick={()=>skip(30)}><Icon name="skip" size={18}/></button>
            </div>
          </div>
          <div className="progress-bar" onClick={seek}>
            <div className="progress-fill" style={{width:`${duration?Math.min(100,(currentTime/duration)*100):0}%`}}/>
          </div>
          <div className="time-row"><span>{fmtTime(currentTime)}</span><span>{fmtTime(duration)}</span></div>
        </div>
      )}

      <WordPanel
        word={selectedWord} sentence={selectedSentence} language={ep.language}
        claudeKey={claudeKey} onClose={()=>setSelectedWord(null)}
        onAddToLibrary={handleAddCard} episode={ep}
      />
    </div>
  );
};

const LibraryPage = ({ flashcards, onDelete, onTogglePin, onUpdateProf, claudeKey }) => {
  const [filter, setFilter] = useState("all");
  const [sort, setSort] = useState("default");
  const [search, setSearch] = useState("");
  const [selectedCard, setSelectedCard] = useState(null);
  const filters = [["all","全部"],["en","英文"],["fr","法文"],["pinned","已置頂"],["unknown","未熟練"],["high","高頻 🔥"]];
  const filtered = flashcards
    .filter(c => filter==="all"||((filter==="en"||filter==="fr")?c.language===filter:filter==="pinned"?c.pinned:filter==="unknown"?c.proficiency==="unknown":c.occurrences>=3))
    .filter(c => !search||c.word.toLowerCase().includes(search.toLowerCase())||c.translation.includes(search))
    .sort((a,b) => sort==="occurrences"?b.occurrences-a.occurrences:b.pinned-a.pinned);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="topbar"><h2>字卡庫</h2><span style={{fontSize:13,color:"var(--text2)"}}>{flashcards.length} 張字卡</span></div>
      <div className="content">
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <input className="input" placeholder="搜尋單字或中文…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <select className="input" style={{width:"auto"}} onChange={e=>setSort(e.target.value)}>
            <option value="default">預設排序</option><option value="occurrences">出現次數</option>
          </select>
        </div>
        <div className="filter-bar">{filters.map(([k,v])=><button key={k} className={`filter-btn ${filter===k?"active":""}`} onClick={()=>setFilter(k)}>{v}</button>)}</div>
        {filtered.length===0 ? (
          <div className="empty-state"><Icon name="layers" size={40}/><h3>沒有字卡</h3><p>在播放器點擊單字並加入字卡庫</p></div>
        ) : (
          <div className="flashcard-grid">
            {filtered.map(card=>(
              <div key={card.id} className={`flashcard ${card.pinned?"pinned":""}`} onClick={()=>setSelectedCard(card)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div><div className="flashcard-word">{card.word}</div><div className="flashcard-pos">{card.partOfSpeech}</div></div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    <span className={`badge badge-${card.language}`}>{card.language==="en"?"EN":"FR"}</span>
                    <span className={`badge badge-${card.proficiency}`}>{card.proficiency==="unknown"?"不會":card.proficiency==="fuzzy"?"模糊":"熟練"}</span>
                  </div>
                </div>
                <div className="flashcard-translation">{card.translation}</div>
                <div className="flashcard-example">{card.exampleOriginal?.slice(0,80)}…</div>
                <div className="flashcard-footer">
                  {card.tags?.[0] && <span className="tag">{card.tags[0]}</span>}
                  {card.occurrences>=3 && <span>🔥</span>}
                  <span style={{fontSize:11,color:"var(--text3)",marginLeft:"auto",fontFamily:"var(--font-mono)"}}>{card.occurrences}×</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      {selectedCard && <FlashcardModal card={selectedCard} onClose={()=>setSelectedCard(null)} onDelete={onDelete} onTogglePin={onTogglePin} onUpdateProf={(id,p)=>{onUpdateProf(id,p);setSelectedCard(c=>({...c,proficiency:p}));}} claudeKey={claudeKey}/>}
    </div>
  );
};

// ============================================================
const QuizPage = ({ flashcards, episodes, claudeKey }) => {
  const [step, setStep] = useState("intro");
  const [quiz, setQuiz] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [fillVal, setFillVal] = useState("");
  const [showAnswer, setShowAnswer] = useState(false);
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const latestEp = episodes.find(e=>e.hasTranscript) || episodes[0];

  const handleStart = async () => {
    if (flashcards.length < 3) { setError("至少需要 3 張字卡才能生成測驗"); return; }
    if (!claudeKey) { setError("請先在設定頁面輸入 Claude API Key"); return; }
    setLoading(true); setError("");
    try {
      const q = await generateQuiz(flashcards, latestEp?.transcript||[], claudeKey);
      setQuiz(q); setStep("quiz"); setQIdx(0); setResults([]); setSelected(null); setFillVal(""); setShowAnswer(false);
    } catch(e) { setError("出題失敗："+e.message); } finally { setLoading(false); }
  };

  const q = quiz[qIdx];
  const handleNext = (correct) => {
    setResults(r=>[...r,{q,correct}]);
    setSelected(null); setFillVal(""); setShowAnswer(false);
    if (qIdx+1<quiz.length) setQIdx(qIdx+1); else setStep("result");
  };
  const checkFill = () => {
    setShowAnswer(true);
    setTimeout(()=>handleNext(fillVal.trim().toLowerCase()===q.answer.toLowerCase()),1600);
  };
  const score = results.filter(r=>r.correct).length;

  if (step==="intro") return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="topbar"><h2>測驗</h2></div>
      <div className="content" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div className="quiz-card" style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:16}}>🧠</div>
          <h3 style={{fontSize:22,marginBottom:12,fontWeight:700}}>AI 動態出題</h3>
          <p style={{color:"var(--text2)",fontSize:14,lineHeight:1.7,marginBottom:24,fontFamily:"var(--font-zh)"}}>
            Claude 會根據你的字卡庫（{flashcards.length} 張）與 Podcast 內容，每次自動生成不同的測驗題，涵蓋英翻中、中翻英、克漏字、選句、填空
          </p>
          {error && <div className="error-box" style={{textAlign:"left",marginBottom:16}}><Icon name="alertCircle" size={15}/>{error}</div>}
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",padding:"13px"}} onClick={handleStart} disabled={loading}>
            {loading ? <><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}><Icon name="loader" size={16}/></span>Claude 出題中…</> : "開始測驗"}
          </button>
          {flashcards.length<3 && <p style={{fontSize:12,color:"var(--text3)",marginTop:12,fontFamily:"var(--font-zh)"}}>請先收聽 Podcast 並加入至少 3 張字卡</p>}
        </div>
      </div>
    </div>
  );

  if (step==="result") {
    const pct = Math.round((score/quiz.length)*100);
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div className="topbar"><h2>測驗結果</h2></div>
        <div className="content" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div className="quiz-card" style={{textAlign:"center"}}>
            <div className="result-circle" style={{borderColor:pct>=70?"var(--green)":pct>=40?"var(--gold)":"var(--coral)"}}>
              <div className="result-pct">{pct}%</div><div className="result-sub">答對率</div>
            </div>
            <h3 style={{fontSize:18,marginBottom:8}}>{pct>=70?"太棒了！":pct>=40?"繼續加油！":"需要多複習"}</h3>
            <p style={{color:"var(--text2)",fontSize:14,marginBottom:24,fontFamily:"var(--font-zh)"}}>{quiz.length} 題中答對 {score} 題{pct<70&&"，建議多複習字卡"}</p>
            <div style={{marginBottom:24,textAlign:"left"}}>
              {results.map((r,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                  <span style={{color:r.correct?"var(--green)":"var(--coral)",flexShrink:0}}><Icon name={r.correct?"check":"x"} size={16}/></span>
                  <span style={{fontSize:13,flex:1,fontFamily:"var(--font-zh)"}}>{r.q.word||r.q.chineseWord||r.q.chineseHint||r.q.answer}</span>
                  {!r.correct && <span className="badge badge-unknown">標記未熟練</span>}
                </div>
              ))}
            </div>
            <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={()=>setStep("intro")}>再測一次</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="topbar">
        <h2>測驗 {qIdx+1} / {quiz.length}</h2>
        <button className="btn btn-ghost btn-sm" onClick={()=>setStep("intro")}>結束</button>
      </div>
      <div className="content" style={{display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:40}}>
        <div className="quiz-card">
          <div className="quiz-progress">{quiz.map((_,i)=><div key={i} className={`quiz-dot ${i<qIdx?"done":i===qIdx?"current":""}`}/>)}</div>
          <div style={{fontSize:11,color:"var(--accent2)",marginBottom:16,fontWeight:600,letterSpacing:1,textTransform:"uppercase",background:"var(--accent-bg)",display:"inline-block",padding:"4px 12px",borderRadius:20}}>
            {QUIZ_TYPE_LABEL[q?.type]||q?.type}
          </div>

          {q?.type==="en_to_zh" && <>
            <div style={{background:"var(--bg4)",borderRadius:"var(--radius-lg)",padding:"20px 24px",marginBottom:24,textAlign:"center"}}>
              <div style={{fontSize:30,fontWeight:700,letterSpacing:-0.5,marginBottom:6}}>{q.word}</div>
              <div style={{fontSize:12,color:"var(--text3)",background:"var(--bg3)",display:"inline-block",padding:"2px 10px",borderRadius:20}}>{q.partOfSpeech}</div>
            </div>
            <div style={{fontSize:13,color:"var(--text3)",marginBottom:12,fontFamily:"var(--font-zh)"}}>這個單字的中文意思是？</div>
            {q.options.map((opt,i)=>(
              <div key={i} className={`quiz-option ${selected===i?(i===q.answer?"correct":"wrong"):showAnswer&&i===q.answer?"revealed":""}`}
                style={{fontFamily:"var(--font-zh)"}}
                onClick={()=>{if(selected!==null)return;setSelected(i);setShowAnswer(true);setTimeout(()=>handleNext(i===q.answer),1200);}}>
                <span style={{color:"var(--text3)",fontFamily:"var(--font-mono)",marginRight:10}}>{String.fromCharCode(65+i)}.</span>{opt}
              </div>
            ))}
          </>}

          {q?.type==="zh_to_en" && <>
            <div style={{background:"var(--bg4)",borderRadius:"var(--radius-lg)",padding:"20px 24px",marginBottom:24,textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:700,fontFamily:"var(--font-zh)",color:"var(--gold)",marginBottom:6}}>{q.chineseWord}</div>
              <div style={{fontSize:12,color:"var(--text3)",background:"var(--bg3)",display:"inline-block",padding:"2px 10px",borderRadius:20}}>{q.partOfSpeech}</div>
            </div>
            <div style={{fontSize:13,color:"var(--text3)",marginBottom:12}}>Which English word matches?</div>
            {q.options.map((opt,i)=>(
              <div key={i} className={`quiz-option ${selected===i?(i===q.answer?"correct":"wrong"):showAnswer&&i===q.answer?"revealed":""}`}
                style={{fontFamily:"var(--font-mono)",fontSize:15}}
                onClick={()=>{if(selected!==null)return;setSelected(i);setShowAnswer(true);setTimeout(()=>handleNext(i===q.answer),1200);}}>
                <span style={{color:"var(--text3)",marginRight:10}}>{String.fromCharCode(65+i)}.</span>{opt}
              </div>
            ))}
          </>}

          {q?.type==="cloze" && <>
            <div style={{background:"var(--bg4)",borderRadius:"var(--radius-lg)",padding:"18px 20px",marginBottom:8,lineHeight:2,fontSize:15}}>
              {q.sentenceBefore}{" "}
              <span style={{display:"inline-block",minWidth:80,borderBottom:"2px solid var(--accent)",textAlign:"center",color:showAnswer?(selected===q.answer?"var(--green)":"var(--coral)"):"var(--accent2)",fontWeight:700,padding:"0 8px",fontFamily:"var(--font-mono)"}}>
                {showAnswer?q.options[selected??q.answer]:"?????"}
              </span>
              {" "}{q.sentenceAfter}
            </div>
            <div style={{fontSize:13,color:"var(--text3)",fontFamily:"var(--font-zh)",marginBottom:20,paddingLeft:4}}>{q.sentenceTranslation}</div>
            {q.options.map((opt,i)=>(
              <div key={i} className={`quiz-option ${selected===i?(i===q.answer?"correct":"wrong"):showAnswer&&i===q.answer?"revealed":""}`}
                style={{fontFamily:"var(--font-mono)",fontSize:15}}
                onClick={()=>{if(selected!==null)return;setSelected(i);setShowAnswer(true);setTimeout(()=>handleNext(i===q.answer),1200);}}>
                <span style={{color:"var(--text3)",marginRight:10}}>{String.fromCharCode(65+i)}.</span>{opt}
              </div>
            ))}
          </>}

          {q?.type==="pick_sentence" && <>
            <div style={{background:"var(--bg4)",borderRadius:"var(--radius-lg)",padding:"20px 24px",marginBottom:24,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:700,letterSpacing:-0.5,marginBottom:4}}>{q.word}</div>
              <div style={{fontSize:14,color:"var(--gold)",fontFamily:"var(--font-zh)"}}>{q.translation}</div>
            </div>
            <div style={{fontSize:13,color:"var(--text3)",marginBottom:14,fontFamily:"var(--font-zh)"}}>哪個例句最符合此單字在 Podcast 中的用法？</div>
            {q.options.map((opt,i)=>(
              <div key={i} className={`quiz-option ${selected===i?(i===q.correctIdx?"correct":"wrong"):showAnswer&&i===q.correctIdx?"revealed":""}`}
                style={{lineHeight:1.65,fontSize:13.5}}
                onClick={()=>{if(selected!==null)return;setSelected(i);setShowAnswer(true);setTimeout(()=>handleNext(i===q.correctIdx),1200);}}>
                <span style={{color:"var(--text3)",marginRight:10}}>{String.fromCharCode(65+i)}.</span>{opt}
              </div>
            ))}
            {showAnswer&&q.note&&<div style={{marginTop:14,padding:"10px 14px",background:"var(--accent-bg)",border:"1px solid var(--accent-border)",borderRadius:"var(--radius)",fontSize:12,color:"var(--accent2)",fontFamily:"var(--font-zh)"}}>💡 {q.note}</div>}
          </>}

          {q?.type==="fill" && <>
            <div style={{background:"var(--accent-bg)",border:"1px solid var(--accent-border)",borderRadius:"var(--radius)",padding:"14px 18px",marginBottom:20}}>
              <div style={{fontSize:11,color:"var(--accent2)",fontWeight:600,letterSpacing:0.8,textTransform:"uppercase",marginBottom:6}}>中文意思</div>
              <div style={{fontSize:18,fontFamily:"var(--font-zh)",fontWeight:600}}>{q.chineseHint}</div>
              <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>{q.partOfSpeech}</div>
            </div>
            <div style={{background:"var(--bg4)",borderRadius:"var(--radius)",padding:"14px 18px",marginBottom:16,fontSize:14,lineHeight:1.8,color:"var(--text2)"}}>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:6,fontWeight:600,letterSpacing:0.8,textTransform:"uppercase"}}>填入英文單字完成句子</div>
              <div>{q.sentence}</div>
              <div style={{fontSize:13,color:"var(--text3)",marginTop:8,fontFamily:"var(--font-zh)"}}>{q.sentenceTranslation}</div>
            </div>
            <input className="input" placeholder="輸入英文單字…" value={fillVal} onChange={e=>setFillVal(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&fillVal&&!showAnswer&&checkFill()}
              style={{textAlign:"center",fontSize:22,fontFamily:"var(--font-mono)",letterSpacing:1,color:showAnswer?(fillVal.trim().toLowerCase()===q.answer.toLowerCase()?"var(--green)":"var(--coral)"):"var(--text)"}}/>
            {showAnswer && (
              <div style={{textAlign:"center",marginTop:12}}>
                {fillVal.trim().toLowerCase()===q.answer.toLowerCase()
                  ? <div style={{color:"var(--green)",fontSize:15,fontWeight:600}}>✓ 正確！</div>
                  : <div><div style={{color:"var(--coral)",fontSize:14,marginBottom:4}}>✗ 答錯了</div>
                      <div style={{fontSize:14,color:"var(--text2)"}}>正確答案：<span style={{color:"var(--green)",fontWeight:700,fontFamily:"var(--font-mono)"}}>{q.answer}</span></div></div>}
              </div>
            )}
            {!showAnswer && <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",marginTop:16}} onClick={checkFill} disabled={!fillVal}>確認</button>}
          </>}
        </div>
      </div>
    </div>
  );
};

// PAGE: REVIEW
// ============================================================
const ReviewPage = ({ flashcards, onUpdateProf }) => {
  const sorted = [...flashcards].sort((a,b)=>{const o={unknown:0,fuzzy:1,mastered:2};return o[a.proficiency]-o[b.proficiency]||b.occurrences-a.occurrences;});
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [done, setDone] = useState(false);
  const card = sorted[idx];

  const next = (prof) => { if(card) onUpdateProf(card.id,prof); setFlipped(false); setTimeout(()=>{if(idx+1<sorted.length)setIdx(idx+1);else setDone(true);},300); };

  if (sorted.length===0) return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="topbar"><h2>複習模式</h2></div>
      <div className="content"><div className="empty-state"><Icon name="repeat" size={40}/><h3>字卡庫是空的</h3><p>先收聽 Podcast 並加入字卡再來複習</p></div></div>
    </div>
  );

  if (done) return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="topbar"><h2>複習模式</h2></div>
      <div className="content" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{textAlign:"center"}}><div style={{fontSize:56,marginBottom:16}}>🎉</div><h3 style={{fontSize:22,marginBottom:8}}>複習完成！</h3>
          <p style={{color:"var(--text2)",marginBottom:24,fontFamily:"var(--font-zh)"}}>已複習 {sorted.length} 張字卡</p>
          <button className="btn btn-primary" onClick={()=>{setIdx(0);setFlipped(false);setDone(false);}}>再複習一次</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="topbar"><h2>複習模式</h2><span style={{fontSize:13,color:"var(--text2)"}}>{idx+1} / {sorted.length}</span></div>
      <div className="content" style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:40}}>
        <div style={{width:"100%",maxWidth:500}}>
          <div style={{display:"flex",gap:6,marginBottom:24}}>
            {sorted.map((_,i)=><div key={i} style={{height:4,flex:1,borderRadius:4,background:i<idx?"var(--accent)":i===idx?"var(--accent2)":"var(--bg4)",transition:"background 0.3s"}}/>)}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:16}}>
            <span className={`badge badge-${card.language}`}>{card.language==="en"?"英文":"法文"}</span>
            <span className={`badge badge-${card.proficiency}`}>{card.proficiency==="unknown"?"不會":card.proficiency==="fuzzy"?"模糊":"熟練"}</span>
            {card.occurrences>=3&&<span style={{color:"var(--coral)"}}>🔥 高頻</span>}
          </div>
          <div className="review-card-outer" onClick={()=>setFlipped(f=>!f)}>
            <div className={`review-card-inner ${flipped?"flipped":""}`}>
              <div className="review-face">
                <div style={{fontSize:36,fontWeight:700,letterSpacing:-1}}>{card.word}</div>
                <div style={{fontSize:13,color:"var(--text3)"}}>{card.partOfSpeech}</div>
                {card.pronunciation && <div style={{fontSize:13,color:"var(--teal)",fontFamily:"var(--font-mono)"}}>{card.pronunciation}</div>}
                <div style={{fontSize:12,color:"var(--text3)",marginTop:8}}>點擊翻牌</div>
              </div>
              <div className="review-face review-face-back">
                <div style={{fontSize:24,fontFamily:"var(--font-zh)",color:"var(--gold)",marginBottom:12}}>{card.translation}</div>
                <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.6,textAlign:"center"}}>{card.exampleOriginal}</div>
                <div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-zh)",textAlign:"center",marginTop:8}}>{card.exampleTranslation}</div>
              </div>
            </div>
          </div>
          {flipped && (
            <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:24}}>
              {[["unknown","不會","var(--coral)","rgba(255,107,107,0.1)","rgba(255,107,107,0.3)"],["fuzzy","模糊","var(--gold)","rgba(232,184,75,0.1)","rgba(232,184,75,0.3)"],["mastered","熟練","var(--green)","rgba(81,207,102,0.1)","rgba(81,207,102,0.2)"]].map(([p,l,c,bg,bc])=>(
                <button key={p} onClick={()=>next(p)} style={{padding:"10px 24px",borderRadius:10,fontSize:14,fontWeight:500,cursor:"pointer",border:`1px solid ${bc}`,background:bg,color:c,fontFamily:"var(--font)"}}>
                  {l}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ============================================================
// PAGE: SETTINGS
// ============================================================
const SettingsPage = ({ settings, onSave }) => {
  const [claudeKey, setClaudeKey] = useState(settings.claudeKey||"");
  const [openaiKey, setOpenaiKey] = useState(settings.openaiKey||"");
  const [showKeys, setShowKeys] = useState(false);
  const [saved, setSaved] = useState(false);

  const save = () => { onSave({claudeKey,openaiKey}); setSaved(true); setTimeout(()=>setSaved(false),2000); };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="topbar"><h2>設定</h2></div>
      <div className="content" style={{maxWidth:600}}>
        <div className="card" style={{marginBottom:20}}>
          <div style={{fontWeight:600,marginBottom:20,fontSize:15}}>🤖 API 金鑰</div>
          <div className="settings-group">
            <div className="settings-label">Claude API Key（單字查詢、例句生成、動態出題）</div>
            <div style={{display:"flex",gap:8}}>
              <input className="input api-key-input" type={showKeys?"text":"password"} placeholder="sk-ant-api03-…" value={claudeKey} onChange={e=>setClaudeKey(e.target.value)}/>
              <button className="btn btn-ghost btn-icon" onClick={()=>setShowKeys(!showKeys)}><Icon name={showKeys?"eyeOff":"eye"} size={16}/></button>
            </div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:6}}>前往 <a href="https://console.anthropic.com" target="_blank" rel="noopener" style={{color:"var(--accent2)"}}>console.anthropic.com</a> 取得 Key</div>
          </div>
          <div className="settings-group">
            <div className="settings-label">OpenAI API Key（Whisper 語音辨識）</div>
            <div style={{display:"flex",gap:8}}>
              <input className="input api-key-input" type={showKeys?"text":"password"} placeholder="sk-…" value={openaiKey} onChange={e=>setOpenaiKey(e.target.value)}/>
            </div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:6}}>前往 <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener" style={{color:"var(--accent2)"}}>platform.openai.com</a> 取得 Key｜Whisper 費率：每分鐘音訊約 $0.006 USD</div>
          </div>
          <div style={{fontSize:12,color:"var(--text3)",background:"var(--bg4)",padding:"10px 14px",borderRadius:"var(--radius)"}}>
            🔒 所有 API Key 僅儲存於你的瀏覽器（localStorage），不會傳送到任何第三方伺服器
          </div>
        </div>

        <div className="card" style={{marginBottom:20}}>
          <div style={{fontWeight:600,marginBottom:16,fontSize:15}}>📱 使用說明</div>
          {[["1. 匯入 Podcast","到「Podcast 集數」貼入 RSS Feed 網址或音訊 .mp3 連結"],["2. 生成逐字稿","選擇集數進入播放器，點擊「生成逐字稿」（需要 OpenAI Key）"],["3. 查詢單字","點擊逐字稿中任何單字，右側彈出 Claude 即時解釋"],["4. 加入字卡","點擊「加入字卡庫」，字卡永久保存在瀏覽器"],["5. 測驗/複習","到「測驗」讓 Claude 動態出題，或到「複習模式」翻牌練習"]].map(([t,d])=>(
            <div key={t} style={{display:"flex",gap:12,marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--accent2)",minWidth:120,fontFamily:"var(--font-zh)"}}>{t}</div>
              <div style={{fontSize:13,color:"var(--text2)",fontFamily:"var(--font-zh)",lineHeight:1.6}}>{d}</div>
            </div>
          ))}
        </div>

        <button className="btn btn-primary" style={{padding:"12px 32px"}} onClick={save}>
          {saved ? <><Icon name="check" size={15}/>已儲存</> : "儲存設定"}
        </button>
      </div>
    </div>
  );
};

// ============================================================
// APP ROOT
// ============================================================
function App() {
  const [page, setPage] = useState("episodes");
  const [episodes, setEpisodes] = useState(() => lsGet(LS_KEYS.episodes, []));
  const [flashcards, setFlashcards] = useState(() => lsGet(LS_KEYS.cards, []));
  const [settings, setSettings] = useState(() => lsGet(LS_KEYS.settings, { claudeKey:"", openaiKey:"" }));
  const [currentEpisode, setCurrentEpisode] = useState(null);

  useEffect(() => { lsSet(LS_KEYS.episodes, episodes); }, [episodes]);
  useEffect(() => { lsSet(LS_KEYS.cards, flashcards); }, [flashcards]);
  useEffect(() => { lsSet(LS_KEYS.settings, settings); }, [settings]);

  const handleImport = (eps) => setEpisodes(e => [...eps.map(ep=>({...ep,language:ep.language||"en"})), ...e]);
  const handleSelectEpisode = (ep) => { setCurrentEpisode(ep); setPage("player"); };
  const handleUpdateEpisode = (ep) => {
    setEpisodes(es => es.map(e => e.id===ep.id ? ep : e));
    setCurrentEpisode(ep);
  };

  const handleAddCard = (cardInfo, episode) => {
    setFlashcards(cards => {
      const existing = cards.find(c => c.word.toLowerCase()===cardInfo.word.toLowerCase() && c.language===cardInfo.language);
      if (existing) {
        return cards.map(c => c.id===existing.id ? {
          ...c, occurrences: c.occurrences+1,
          occurrenceRecords: [...(c.occurrenceRecords||[]), { source: episode?.title||"", sentence: cardInfo.occurrenceRecords?.[0]?.sentence||"", time: cardInfo.occurrenceRecords?.[0]?.time||"" }]
        } : c);
      }
      return [cardInfo, ...cards];
    });
  };

  const handleDeleteCard = (id) => setFlashcards(c => c.filter(card => card.id!==id));
  const handleTogglePin = (id) => setFlashcards(c => c.map(card => card.id===id ? {...card,pinned:!card.pinned} : card));
  const handleUpdateProf = (id, prof) => setFlashcards(c => c.map(card => card.id===id ? {...card,proficiency:prof} : card));
  const handleSaveSettings = (s) => setSettings(s);

  const navItems = [
    { id:"episodes", icon:"mic", label:"Podcast 集數" },
    { id:"player", icon:"play", label:"播放器" },
    { id:"library", icon:"layers", label:"字卡庫" },
    { id:"review", icon:"repeat", label:"複習模式" },
    { id:"quiz", icon:"brain", label:"測驗" },
    { id:"settings", icon:"settings", label:"設定" },
  ];

  return (
    <>
      <style>{styles}</style>
      <div className="app">
        <div className="sidebar">
          <div className="sidebar-logo">
            <h1>Learn with<br/><span>Podcast</span></h1>
            <p>Podcast 語言學習工具</p>
          </div>
          {navItems.map(item => (
            <button key={item.id} className={`nav-item ${page===item.id?"active":""}`} onClick={()=>setPage(item.id)}>
              <Icon name={item.icon} size={16}/>{item.label}
              {item.id==="library" && flashcards.length>0 && <span style={{marginLeft:"auto",fontSize:11,background:"var(--accent-bg)",color:"var(--accent2)",padding:"1px 7px",borderRadius:20}}>{flashcards.length}</span>}
            </button>
          ))}
          {!settings.claudeKey && (
            <div style={{margin:"auto 12px 12px",padding:"10px 12px",background:"var(--gold-bg)",border:"1px solid rgba(232,184,75,0.2)",borderRadius:"var(--radius)",fontSize:11,color:"var(--gold)",lineHeight:1.5,fontFamily:"var(--font-zh)"}}>
              ⚠️ 請先到設定輸入 API Key
            </div>
          )}
        </div>
        <div className="main">
          {page==="episodes" && <EpisodesPage episodes={episodes} onSelectEpisode={handleSelectEpisode} onImport={handleImport} openaiKey={settings.openaiKey}/>}
          {page==="player" && <PlayerPage episode={currentEpisode} onUpdateEpisode={handleUpdateEpisode} onAddCard={handleAddCard} flashcards={flashcards} claudeKey={settings.claudeKey} openaiKey={settings.openaiKey}/>}
          {page==="library" && <LibraryPage flashcards={flashcards} onDelete={handleDeleteCard} onTogglePin={handleTogglePin} onUpdateProf={handleUpdateProf} claudeKey={settings.claudeKey}/>}
          {page==="review" && <ReviewPage flashcards={flashcards} onUpdateProf={handleUpdateProf}/>}
          {page==="quiz" && <QuizPage flashcards={flashcards} episodes={episodes} claudeKey={settings.claudeKey}/>}
          {page==="settings" && <SettingsPage settings={settings} onSave={handleSaveSettings}/>}
        </div>
        {/* Mobile bottom navigation */}
        <nav className="bottom-nav">
          {[
            {id:"episodes",icon:"mic",label:"集數"},
            {id:"player",icon:"play",label:"播放"},
            {id:"library",icon:"layers",label:"字卡"},
            {id:"review",icon:"repeat",label:"複習"},
            {id:"quiz",icon:"brain",label:"測驗"},
            {id:"settings",icon:"settings",label:"設定"},
          ].map(item => (
            <button key={item.id} className={`bottom-nav-item ${page===item.id?"active":""}`} onClick={()=>setPage(item.id)}>
              <Icon name={item.icon} size={20}/>
              {item.id==="library" && flashcards.length>0 && <span className="nav-badge">{flashcards.length}</span>}
              <span>{item.label}</span>
            </button>
          ))}
        </nav>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
